<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Companion — RecoverAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: "rgb(var(--background) / <alpha-value>)",
            surface: "rgb(var(--surface) / <alpha-value>)",
            "surface-raised": "rgb(var(--surface-raised) / <alpha-value>)",
            border: "rgb(var(--border) / <alpha-value>)",
            "text-primary": "rgb(var(--text-primary) / <alpha-value>)",
            "text-secondary": "rgb(var(--text-secondary) / <alpha-value>)",
            "text-tertiary": "rgb(var(--text-tertiary) / <alpha-value>)",
            primary: "rgb(var(--primary) / <alpha-value>)",
            accent: "rgb(var(--accent) / <alpha-value>)",
            danger: "rgb(var(--danger) / <alpha-value>)",
            success: "rgb(var(--success) / <alpha-value>)",
            warning: "rgb(var(--warning) / <alpha-value>)"
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      :root {
        /* Light Mode — Aligned with Main App */
        --background: 248 250 252;
        --surface: 255 255 255;
        --surface-raised: 241 245 249;
        --border: 226 232 240;
        --text-primary: 15 23 42;
        --text-secondary: 100 116 139;
        --text-tertiary: 148 163 184;
        --primary: 59 130 246;
        --accent: 139 92 246;
        --danger: 239 68 68;
        --success: 34 197 94;
        --warning: 234 179 8;
      }

      .dark {
        /* Dark Mode — Aligned with Main App (Deep Navy) */
        --background: 10 10 15;
        --surface: 20 20 28;
        --surface-raised: 28 28 40;
        --border: 38 38 54;
        --text-primary: 248 250 252;
        --text-secondary: 148 163 184;
        --text-tertiary: 100 116 139;
      }

      html {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }


      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background-color: rgb(var(--border)); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background-color: rgb(var(--text-tertiary)); }
      ::selection { background-color: rgb(var(--primary) / 0.15); color: rgb(var(--primary)); }
    }

    @layer utilities {
      .bg-surface-raised { background-color: rgb(var(--surface-raised)); }
      .text-text-tertiary { color: rgb(var(--text-tertiary)); }
      .status-dot-live {
        display: inline-block;
        width: 0.5rem; height: 0.5rem;
        border-radius: 999px;
        background-color: rgb(var(--success));
        animation: pulseLive 2s ease-in-out infinite;
      }
    }

    @keyframes pulseLive {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }
  </style>
  <script>
    // Listen for theme changes from parent window (main RecoverAI app)
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'THEME_CHANGE') {
        if (event.data.isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }
    });
    // ALWAYS start in light mode — the parent will postMessage the real theme after iframe loads.
    // Do NOT read localStorage here, as the CC iframe may have stale 'dark' state.
    document.documentElement.classList.remove('dark');
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "uuid": "https://esm.sh/uuid@^13.0.0"
  }
}
</script>
  <script type="module" crossorigin src="/clinical_companion/assets/index-B_7rjTd6.js"></script>
</head>

<body class="bg-background text-text-primary font-sans antialiased transition-colors duration-500">
  <div id="root"></div>
</body>

</html>
